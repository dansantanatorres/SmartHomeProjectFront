<div class="inner video-section">
  <video #heroVideo autoplay muted playsinline preload="auto"></video>
  
  <div class="play-overlay" #playOverlay>
    <div class="play-content">
    <button class="promo-close" (click)="startVideo()">✕</button>
    <div class="promo-banner">
        <span class="promo-icon">🎉</span>
        <span class="promo-title">{{ 'PROMO.TITLE' | translate }}</span>
        <span class="promo-subtitle">{{ 'PROMO.SUBTITLE' | translate }}</span>
        <div class="promo-actions">
        <button class="promo-btn" (click)="startVideo(); scrollTo('plans')">
            {{ 'PROMO.BUTTON' | translate }}
        </button>
        </div>
    </div>
    </div>
  </div>

  <div class="overlay">
    <header>
      <p class="hero-slogan">
        Smart Home. <span>{{ 'HEADER.TITLE' | translate }}</span>
      </p>
    </header>
  </div>
</div>
